name = "quickfixdata"
main = "worker.js"
compatibility_date = "2026-07-14"
workers_dev = false

routes = [
  { pattern = "api.quickfixdata.in", custom_domain = true }
]

[observability]
enabled = true

[triggers]
crons = [
  "0 16 * * *",
  "0 3 * * 1"
]

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_PRODUCTION_SESSIONS_KV_NAMESPACE_ID"

[vars]
ALLOWED_ORIGIN = "https://quickfixdata.in"
FROM_EMAIL = "QuickFix Data <invoices@quickfixdata.in>"
OWNER_EMAIL = "quickfixdata@gmail.com"

# Configure these with `wrangler secret put` in production:
# ADMIN_KEY
# ANTHROPIC_API_KEY
# RESEND_API_KEY
# UPI_ID
# UPI_PAYEE_NAME
